version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-dashboard-backend
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_OjkzrpUmE7i0@ep-misty-wind-amsnuiq5-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
      JWT_ACCESS_SECRET: your-super-secret-access-key-change-in-production-velozity-2026
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production-velozity-2026
      PORT: 5000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-dashboard-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_WS_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
